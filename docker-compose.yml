version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: furnishop_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       furnishop
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U postgres -d furnishop']
      interval: 5s
      timeout:  3s
      retries:  10

  adminer:
    image: adminer:latest
    container_name: furnishop_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  pg_data:
    name: furnishop_pgdata
